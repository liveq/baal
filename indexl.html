<!DOCTYPE html>
<html>
<head>
    <title>BAAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 50%, #f1f3f4 100%);
            color: #2c2c2c; 
            font-family: 'Inter', sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 50px 30px;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.06),
                0 2px 10px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .main-title { 
            font-family: 'Playfair Display', serif;
            font-size: 2.2em; 
            font-weight: 500;
            margin-bottom: 25px;
            background: linear-gradient(-45deg, #d4af37, #ffd700, #b8860b, #daa520, #d4af37);
            background-size: 300% 300%;
            animation: gradientFlow 4s ease-in-out infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            line-height: 1.4;
            word-break: keep-all;
        }
        
        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            margin-bottom: 50px;
            color: #f8f9fa;
            font-weight: 400;
            line-height: 1.4;
            word-break: keep-all;
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
        }
        
        .subtitle::selection {
            background: #333;
            color: #fff;
        }
        
        .subtitle::-moz-selection {
            background: #333;
            color: #fff;
        }
        
        .qr-container {
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            margin: 20px 0 35px 0;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .qr-container:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            color: #4a4a4a;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 0.25em;
            animation: subtleFlash 10s infinite;
            cursor: default;
        }
        
        .contact-info {
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            color: #4a4a4a;
            font-weight: 500;
            margin-bottom: 12px;
        }
        
        .contact-email {
            font-size: 0.85em;
            color: #6c757d;
            font-weight: 400;
        }
        
        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .container {
                padding: 40px 25px;
                margin: 20px;
            }
            
            .main-title {
                font-size: 1.8em;
                line-height: 1.4;
            }
            
            .subtitle {
                font-size: 0.9em;
            }
        }
        
        @media (max-width: 480px) {
            .main-title {
                font-size: 1.6em;
            }
            
            .container {
                padding: 35px 20px;
            }
        }
        
        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        @keyframes subtleFlash {
            0% {
                color: #4a4a4a;
                font-weight: 400;
            }
            90% {
                color: #4a4a4a;
                font-weight: 400;
            }
            91% {
                color: #8b4444;
                font-weight: 600;
            }
            100% {
                color: #8b4444;
                font-weight: 600;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-title">가치 있는 자만이<br>가치를 얻는다</div>
        
        <div class="subtitle">어디까지가 네 한계인지 스스로 결정하라</div>
        
        <div class="section-title">신앙을 증명하라</div>
        
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=bitcoin:12xHw6nKomS6cruzBoKFkoEF78NJfWKRgn&bgcolor=ffffff&color=333333" 
                 alt="Bitcoin QR Code" />
        </div>
        
        <div class="contact-info">Deal with the BAAL</div>
        <div class="contact-email">baal.contract@gmail.com</div>
    </div>
</body>
</html>
